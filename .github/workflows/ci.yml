name: CI

on:
  push:
    branches: [ main, p2p-beta, proton-debug ]
  pull_request:
    branches: [ main, p2p-beta, proton-debug ]

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest
        build-cache: true

    - name: Configure xmake (Debug)
      timeout-minutes: 15
      run: |
        xmake update
        xmake global --clean
        xmake config -m debug -a x64 -p windows -y -vD

    - name: Build project (Debug)
      timeout-minutes: 20
      run: xmake build Payday3-Internal

    - name: Run tests
      run: xmake test
      continue-on-error: true

    - name: Configure xmake (Release)
      timeout-minutes: 15
      run: |
        xmake update
        xmake global --clean
        xmake config -m release -a x64 -p windows -y -vD

    - name: Build project (Release)
      timeout-minutes: 20
      run: xmake build Payday3-Internal

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: payday3-internal-build
        path: |
          Build/Release/**/*.dll
        retention-days: 7
