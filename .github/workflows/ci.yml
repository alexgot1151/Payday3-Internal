name: CI

on:
  push:
    branches: [ main, p2p-beta ]
  pull_request:
    branches: [ main, p2p-beta ]

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 60
    
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_MAX_CONCURRENCY: 1

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest
        build-cache: true

    - name: Configure xmake (Debug)
      run: xmake config -m debug -a x64 -p windows -y

    - name: Build project (Debug)
      run: xmake build Payday3-Internal

    - name: Run tests
      run: xmake test
      continue-on-error: true

    - name: Configure xmake (Release)
      run: xmake config -m release -a x64 -p windows -y

    - name: Build project (Release)
      run: xmake build Payday3-Internal

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: payday3-internal-build
        path: |
          Build/Release/**/*.dll
        retention-days: 7
