name: CI

on:
  push:
    branches: [ main, p2p-beta ]
  pull_request:
    branches: [ main, p2p-beta ]

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 60
    
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_MAX_CONCURRENCY: 1

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup xmake
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: latest
        build-cache: true

    - name: Configure xmake (Debug)
      run: |
        xmake update
        xmake global --clean
        xmake config -m debug -a x64 -p windows -y

    - name: Build project (Debug)
      run: xmake build Payday3-Internal

    - name: Dump xmake package failure logs (Debug)
      if: failure()
      shell: pwsh
      run: |
        Write-Host "Searching for xmake package failure logs..."
        $failed = Get-ChildItem -Path "build/.packages" -Recurse -Filter "install.txt" -ErrorAction SilentlyContinue |
          Where-Object { $_.FullName -match "installdir\.failed\\logs\\install\.txt$" }

        if (-not $failed) {
          Write-Host "No install.txt files found under installdir.failed/logs."
        }

        foreach ($f in $failed) {
          Write-Host "`n===== $($f.FullName) ====="
          Get-Content -Path $f.FullName -Raw
        }

    - name: Run tests
      run: xmake test
      continue-on-error: true

    - name: Configure xmake (Release)
      run: |
        xmake global --clean
        xmake config -m release -a x64 -p windows -y

    - name: Build project (Release)
      run: xmake build Payday3-Internal

    - name: Dump xmake package failure logs (Release)
      if: failure()
      shell: pwsh
      run: |
        Write-Host "Searching for xmake package failure logs..."
        $failed = Get-ChildItem -Path "build/.packages" -Recurse -Filter "install.txt" -ErrorAction SilentlyContinue |
          Where-Object { $_.FullName -match "installdir\.failed\\logs\\install\.txt$" }

        if (-not $failed) {
          Write-Host "No install.txt files found under installdir.failed/logs."
        }

        foreach ($f in $failed) {
          Write-Host "`n===== $($f.FullName) ====="
          Get-Content -Path $f.FullName -Raw
        }

    - name: Upload xmake package logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: xmake-package-logs
        path: build/.packages/**/cache/**/logs/*.txt
        if-no-files-found: ignore
        retention-days: 7

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: payday3-internal-build
        path: |
          Build/Release/**/*.dll
        retention-days: 7
